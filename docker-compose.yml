services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE: python:3.11
    ports:
        - "8002:8000"
    environment:
      DBHOST: postgres
      DBUSER: admin
      DBNAME: postgres
      DBPASS: LocalPasswordOnly

    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE: python:3.11
    entrypoint: ""
    command: >
      sh -c "
      echo 'Scheduler started';
      while true; do
        now=$$(date +%s);
        target=$$(date -d '22:00' +%s);

        if [ $$now -ge $$target ]; then
          target=$$(date -d 'tomorrow 22:00' +%s);
        fi;

        sleep_seconds=$$((target - now));
        echo \"Sleeping for $$sleep_seconds seconds until 6pm...\";
        sleep $$sleep_seconds;

        echo 'Running daily summaries...';
        python manage.py send_summaries;
      done
      "
    environment:
      DBHOST: postgres
      DBUSER: admin
      DBNAME: postgres
      DBPASS: LocalPasswordOnly
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: LocalPasswordOnly
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  internal:
